<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Tests</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .pass { color: green; }
        .fail { color: red; }
        .test { margin: 10px 0; }
        #summary { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Calculator Unit Tests</h1>
    <div id="results"></div>
    <div id="summary"></div>
    <script src="src/utils/calculator.js"></script>
    <script>
        const results = document.getElementById('results');
        const summary = document.getElementById('summary');
        let passed = 0;
        let failed = 0;

        function test(name, fn) {
            const div = document.createElement('div');
            div.className = 'test';
            try {
                fn();
                div.className = 'test pass';
                div.textContent = `✓ ${name}`;
                passed++;
            } catch (e) {
                div.className = 'test fail';
                div.textContent = `✗ ${name}: ${e.message}`;
                failed++;
            }
            results.appendChild(div);
        }

        function assertEqual(actual, expected, msg = '') {
            if (actual !== expected) {
                throw new Error(`Expected "${expected}" but got "${actual}"${msg ? '. ' + msg : ''}`);
            }
        }

        test('Calculator: initial state', () => {
            const calc = new Calculator();
            assertEqual(calc.getDisplay(), '0');
            assertEqual(calc.getPreview(), '');
            assertEqual(calc.firstOperand, null);
            assertEqual(calc.operator, null);
        });

        test('Calculator: inputNumber', () => {
            const calc = new Calculator();
            calc.inputNumber('5');
            assertEqual(calc.getDisplay(), '5');
            calc.inputNumber('3');
            assertEqual(calc.getDisplay(), '53');
        });

        test('Calculator: inputDecimal', () => {
            const calc = new Calculator();
            calc.inputDecimal();
            assertEqual(calc.getDisplay(), '0.');
            calc.inputNumber('5');
            calc.inputDecimal();
            assertEqual(calc.getDisplay(), '0.5');
        });

        test('Calculator: inputOperator addition', () => {
            const calc = new Calculator();
            calc.inputNumber('5');
            calc.inputOperator('+');
            assertEqual(calc.firstOperand, 5);
            assertEqual(calc.operator, '+');
            assertEqual(calc.waitingForSecondOperand, true);
        });

        test('Calculator: calculate addition', () => {
            const calc = new Calculator();
            calc.inputNumber('5');
            calc.inputOperator('+');
            calc.inputNumber('3');
            calc.calculate();
            assertEqual(calc.getDisplay(), '8');
        });

        test('Calculator: calculate subtraction', () => {
            const calc = new Calculator();
            calc.inputNumber('10');
            calc.inputOperator('-');
            calc.inputNumber('4');
            calc.calculate();
            assertEqual(calc.getDisplay(), '6');
        });

        test('Calculator: calculate multiplication', () => {
            const calc = new Calculator();
            calc.inputNumber('6');
            calc.inputOperator('*');
            calc.inputNumber('7');
            calc.calculate();
            assertEqual(calc.getDisplay(), '42');
        });

        test('Calculator: calculate division', () => {
            const calc = new Calculator();
            calc.inputNumber('20');
            calc.inputOperator('/');
            calc.inputNumber('4');
            calc.calculate();
            assertEqual(calc.getDisplay(), '5');
        });

        test('Calculator: division by zero', () => {
            const calc = new Calculator();
            calc.inputNumber('5');
            calc.inputOperator('/');
            calc.inputNumber('0');
            calc.calculate();
            assertEqual(calc.getDisplay(), 'Error');
        });

        test('Calculator: clear', () => {
            const calc = new Calculator();
            calc.inputNumber('5');
            calc.inputOperator('+');
            calc.inputNumber('3');
            calc.clear();
            assertEqual(calc.getDisplay(), '0');
            assertEqual(calc.firstOperand, null);
            assertEqual(calc.operator, null);
        });

        test('Calculator: clearEntry', () => {
            const calc = new Calculator();
            calc.inputNumber('5');
            calc.inputOperator('+');
            calc.inputNumber('3');
            calc.clearEntry();
            assertEqual(calc.getDisplay(), '0');
            assertEqual(calc.firstOperand, 5);
            assertEqual(calc.operator, '+');
        });

        test('Calculator: backspace', () => {
            const calc = new Calculator();
            calc.inputNumber('5');
            calc.inputNumber('3');
            calc.backspace();
            assertEqual(calc.getDisplay(), '5');
            calc.backspace();
            assertEqual(calc.getDisplay(), '0');
        });

        test('Calculator: chained operations', () => {
            const calc = new Calculator();
            calc.inputNumber('5');
            calc.inputOperator('+');
            calc.inputNumber('3');
            calc.inputOperator('*');
            calc.inputNumber('2');
            calc.calculate();
            assertEqual(calc.getDisplay(), '16');
        });

        test('calculate function: basic operations', () => {
            assertEqual(calculate(2, '+', 3), 5);
            assertEqual(calculate(10, '-', 4), 6);
            assertEqual(calculate(3, '*', 4), 12);
            assertEqual(calculate(15, '/', 3), 5);
        });

        test('calculate function: division by zero', () => {
            assertEqual(calculate(5, '/', 0), 'Error');
        });

        test('formatResult: large numbers', () => {
            const result = formatResult(1234567890123);
            assertEqual(result.includes('e'), true);
        });

        test('formatResult: decimal precision', () => {
            const result = formatResult(1 / 3);
            assertEqual(result.length <= 14, true);
        });

        test('formatDisplay: leading zeros', () => {
            assertEqual(formatDisplay('0123'), '123');
            assertEqual(formatDisplay('0'), '0');
        });

        summary.textContent = `Results: ${passed} passed, ${failed} failed`;
    </script>
</body>
</html>
