## 5. 数据模型

### 5.1 计算器状态

```typescript
interface CalculatorState {
  displayValue: string;      // 当前显示值，默认 "0"
  firstOperand: number | null;  // 第一个操作数
  operator: string | null;      // 当前运算符 (+, -, *, /)
  waitingForSecondOperand: boolean; // 是否等待输入第二个操作数
}
```

### 5.2 无持久化需求

根据 PRD：
- 无需保存计算历史
- 无需用户登录
- 无需数据存储

