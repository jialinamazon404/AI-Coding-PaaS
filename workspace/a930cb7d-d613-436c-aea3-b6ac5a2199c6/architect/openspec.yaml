## 12. 验收标准

基于 PRD 中的功能清单：

| 功能 ID | 功能名称 | 验收条件 |
|---------|----------|----------|
| FR-001 | 数字输入 | 点击数字按钮，显示屏显示对应数字 |
| FR-002 | 四则运算 | 支持 + - × ÷ ，除零显示 Error |
| FR-003 | 小数点支持 | 每个操作数一个小数点，最多10位精度 |
| FR-004 | 清除功能 | C 清除全部，CE 清除当前，退格删一位 |
| FR-005 | 键盘支持 | 数字键、运算符、Enter、Escape、Backspace |
| FR-006 | 响应式布局 | 桌面/移动端正常显示，按钮 ≥44px |

