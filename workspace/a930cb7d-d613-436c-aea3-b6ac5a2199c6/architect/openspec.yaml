## 3. 技术选型

### 方案一：原生 HTML/CSS/JS（推荐）

| 维度 | 选择 |
|------|------|
| 前端框架 | 原生 JavaScript (无框架) |
| 样式方案 | 纯 CSS |
| 构建工具 | 无需（单文件可直接运行） |
| 部署方式 | 静态文件托管 |
| 预估工时 | 1-2 天 |

**优点**:
- 无依赖，轻量级（< 50KB）
- 学习成本低，维护简单
- 加载速度最快
- 兼容性好

**适用场景**: 本项目（简单计算器）

---

### 方案二：React/Vue 框架

| 维度 | 选择 |
|------|------|
| 前端框架 | React 18 或 Vue 3 |
| 样式方案 | CSS Modules / Tailwind CSS |
| 构建工具 | Vite |
| 部署方式 | 静态文件托管 |
| 预估工时 | 2-3 天 |

**优点**:
- 组件化开发
- 状态管理方便
- 生态丰富

**缺点**:
- 引入框架体积（React ~40KB, Vue ~20KB）
- 过度设计

**适用场景**: 未来需要扩展更多功能时

