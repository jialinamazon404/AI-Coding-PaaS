## 4. 组件设计

### 4.1 组件结构

```
Calculator (根组件)
├── Display (显示屏)
│   └── 显示当前输入/结果
├── Keypad (按键区)
│   ├── NumberButtons (数字键 0-9)
│   ├── OperatorButtons (运算符 + - × ÷)
│   ├── FunctionButtons (功能键 C CE =)
│   └── DecimalButton (小数点)
└── KeyboardHandler (键盘监听器)
    └── 处理键盘事件
```

### 4.2 组件接口

#### Calculator 组件

```typescript
interface CalculatorState {
  display: string;        // 显示屏内容
  firstOperand: number | null;  // 第一个操作数
  operator: string | null;     // 当前运算符
  waitingForSecond: boolean;   // 是否等待输入第二个操作数
  shouldResetDisplay: boolean; // 是否应重置显示屏
}

// 核心方法
class Calculator {
  // 输入数字
  inputNumber(num: string): void;
  
  // 输入运算符
  inputOperator(op: string): void;
  
  // 输入小数点
  inputDecimal(): void;
  
  // 清除 (C)
  clear(): void;
  
  // 清除当前输入 (CE)
  clearEntry(): void;
  
  // 退格
  backspace(): void;
  
  // 计算结果
  calculate(): number | Error;
}
```

### 4.3 状态机设计

```mermaid
stateDiagram-v2
    [*] --> Initial: 页面加载
    Initial --> InputFirst: 输入数字
    InputFirst --> InputFirst: 继续输入数字
    InputFirst --> WaitSecond: 输入运算符
    WaitSecond --> InputSecond: 输入数字
    InputSecond --> InputSecond: 继续输入数字
    InputSecond --> Calculate: 按 '='
    Calculate --> Initial: 计算完成
    WaitSecond --> InputSecond: 切换运算符
```

