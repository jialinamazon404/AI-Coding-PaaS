## 8. 风险与依赖

### 8.1 技术风险

| 风险 | 级别 | 缓解措施 |
|------|------|----------|
| 浮点精度问题 (0.1 + 0.2 = 0.30000000000000004) | 中 | 使用 toFixed() 处理显示精度 |
| 键盘事件兼容性 | 低 | 使用标准 keydown 事件 |
| 移动端触摸响应 | 低 | 设置合适的按钮尺寸 (≥44px) |

### 8.2 依赖项

| 依赖 | 用途 | 版本 |
|------|------|------|
| 无 | 本项目为零依赖 | - |

