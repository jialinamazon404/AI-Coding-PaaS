## 7. 关键算法

### 7.1 计算逻辑

```javascript
function calculate(a, operator, b) {
  switch (operator) {
    case '+': return a + b;
    case '-': return a - b;
    case '*': return a * b;
    case '/': 
      if (b === 0) return 'Error'; // 除零处理
      return a / b;
    default: return b;
  }
}
```

### 7.2 精度处理

- 使用 JavaScript Number 类型
- 最大显示位数：12位
- 小数精度：最多10位
- 超出显示范围使用科学计数法

